<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>1930 모던걸 AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <!-- MindAR: poster.jpg를 알아보는 웹AR 라이브러리 (본체 → A-Frame 연결 순서로 로드) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; }
    #status {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding: 10px 16px; text-align: center;
      background: rgba(0, 0, 0, 0.6); color: #fff; font-size: 15px;
    }
    #btn-play {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 10;
      display: none; padding: 14px 26px; border: none; border-radius: 999px;
      font-size: 16px; font-weight: bold; color: #fff; cursor: pointer;
      background: linear-gradient(135deg, #8b5a2b, #c0392b);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }
    #btn-play.visible { display: block; }
  </style>
</head>
<body>
  <div id="status">📷 포스터(poster.jpg)를 비춰 보세요</div>
  <button id="btn-play">▶️ 노래 재생</button>

  <!-- 자막 보드 컴포넌트: 한글은 캔버스에 그려야 표시됩니다. a-scene보다 먼저 등록! -->
  <script>
    const CAPTION = '1930년 경성을 살아간 모던걸';

    AFRAME.registerComponent('caption-board', {
      init: function () {
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 160;
        const ctx = canvas.getContext('2d');
        const r = 36;
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.arcTo(canvas.width, 0, canvas.width, canvas.height, r);
        ctx.arcTo(canvas.width, canvas.height, 0, canvas.height, r);
        ctx.arcTo(0, canvas.height, 0, 0, r);
        ctx.arcTo(0, 0, canvas.width, 0, r);
        ctx.closePath();
        ctx.fillStyle = 'rgba(30, 20, 10, 0.82)';
        ctx.fill();
        ctx.textAlign = 'center';
        ctx.fillStyle = '#f5e6c8';
        ctx.font = 'bold 58px "Malgun Gothic", sans-serif';
        ctx.fillText(CAPTION, canvas.width / 2, 100);

        const apply = () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh) return;
          const tex = new THREE.CanvasTexture(canvas);
          mesh.material.map = tex;
          mesh.material.transparent = true;
          mesh.material.needsUpdate = true;
        };
        if (this.el.hasLoaded) apply();
        else this.el.addEventListener('loaded', apply, { once: true });
      },
    });
  </script>

  <a-scene
    mindar-image="imageTargetSrc: ./poster.mind; autoStart: true; uiLoading: yes; uiScanning: yes;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="girl" src="girl.png" />
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <!-- 포스터 위로 떠오르는 모던걸 이미지 -->
      <a-image src="#girl" width="0.8" height="1.15" position="0 0.15 0.1" scale="0.001 0.001 0.001"
               animation__in="property: scale; to: 1 1 1; dur: 700; easing: easeOutBack; startEvents: targetFound"
               animation__float="property: position; from: 0 0.15 0.1; to: 0 0.28 0.1; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine">
      </a-image>
      <!-- 아래쪽 자막 -->
      <a-plane caption-board width="1.1" height="0.17" position="0 -0.62 0.1" material="transparent: true"></a-plane>
    </a-entity>
  </a-scene>

  <audio id="song" src="song.mp3" loop preload="auto"></audio>

  <script>
    const status = document.getElementById('status');
    const btnPlay = document.getElementById('btn-play');
    const target = document.getElementById('target');
    const song = document.getElementById('song');

    const tryPlay = () => {
      song.play().then(() => {
        status.textContent = '🎵 1930년대 인천항의 모던걸 ♪';
        status.style.background = 'rgba(140, 60, 30, 0.8)';
        btnPlay.classList.remove('visible');
      }).catch(() => {
        status.textContent = '👆 아래 버튼을 누르면 노래가 시작됩니다';
        btnPlay.classList.add('visible');
      });
    };

    target.addEventListener('targetFound', () => {
      status.textContent = '✅ 포스터 인식!';
      status.style.background = 'rgba(22, 160, 60, 0.75)';
      tryPlay();
    });

    target.addEventListener('targetLost', () => {
      status.textContent = '📷 포스터(poster.jpg)를 비춰 보세요';
      status.style.background = 'rgba(0, 0, 0, 0.6)';
      song.pause();
    });

    btnPlay.addEventListener('click', (e) => { e.stopPropagation(); tryPlay(); });
    document.body.addEventListener('click', () => {
      if (song.paused && target.object3D && target.object3D.visible) tryPlay();
    });
  </script>
</body>
</html>
